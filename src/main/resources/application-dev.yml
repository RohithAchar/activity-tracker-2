spring:
  datasource:
    url: jdbc:h2:mem:activity_tracker_dev
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
jwt:
  secret: dev-secret-key-change-in-prod-min-256-bits-long-for-hs256
  expiration: 86400000
